name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Debug runner
        run: |
          echo "Shell: $SHELL"
          which bash || echo "bash not found"
          which npm || echo "npm not found"
          node -v || echo "node not found"
          npm -v || echo "npm not found"