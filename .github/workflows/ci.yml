name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
          steps:
      - name: Debug runner
        run: |
          echo "Shell: $SHELL"
          which bash || echo "bash not found"
          which npm || echo "npm not found"
          node -v || echo "node not found"
          npm -v || echo "npm not found"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t hello-api .